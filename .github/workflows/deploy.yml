name: Deploy

# Build + publish ONLY -- decoupled from screening. Fetches the latest
# results.json from the `data` branch (produced by screen.yml), builds the SPA,
# and ships data + frontend together as one same-origin GitHub Pages artifact.
# Never runs the screener: the data is reused, so a frontend change republishes
# WITHOUT a ~515-call rescreen.
#
# Triggers:
#   - web/** push   -> redeploy on a frontend change (reuses the last data)
#   - workflow_run  -> deploy after a successful Screen (fresh data)
#   - manual        -> republish on demand
#
# A GITHUB_TOKEN push to the data branch does NOT emit a push event (GitHub loop
# guard), so screen.yml CANNOT trigger this via `push: [data]` -- workflow_run is
# the required link.
#
# Bootstrap: the `data` branch must exist first. Run the Screen workflow once;
# until then the fetch step below fails loud with instructions.
#
# Pages source must be set to "GitHub Actions" in repo Settings -> Pages
# (one-time, operator).

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_run:
    workflows: ["Screen"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip a deploy chained off a FAILED Screen; push / manual always proceed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch latest results.json from the data branch
        run: |
          set -euo pipefail
          if ! git fetch -q --depth=1 origin data; then
            echo "::error::No 'data' branch yet. Run the Screen workflow once to seed results.json."
            exit 1
          fi
          mkdir -p web/public/data
          git show origin/data:web/public/data/results.json > web/public/data/results.json
          jq -e '.rows | length > 0' web/public/data/results.json > /dev/null \
            || { echo "::error::results.json from the data branch is empty or corrupt"; exit 1; }
          echo "Fetched $(jq '.rows | length' web/public/data/results.json) rows" \
               "(generated $(jq -r '.generated_at' web/public/data/results.json))."

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11   # must be 10+: pnpm-workspace.yaml uses the `allowBuilds` key

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"   # pnpm 11 requires Node >=22.13 (uses node:sqlite)

      - name: Build frontend
        run: |
          pnpm -C web install
          pnpm -C web build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
